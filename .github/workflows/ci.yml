name: CI

on:
  pull_request:
    branches:
      - main
env:
  CI: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: lynx-ubuntu-24.04-xlarge
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - name: Install
        run: |
          npm i -g corepack@latest
          corepack enable
          pnpm install
      - name: Lint
        env:
          CHANGESET_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          pnpm meta-updater --test
          pnpm dprint check
          pnpm changeset status --verbose --since $CHANGESET_BASE_SHA
      - name: Build
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha }}
          NODE_OPTIONS: --max-old-space-size=8192
        run: pnpm turbo run build --affected
